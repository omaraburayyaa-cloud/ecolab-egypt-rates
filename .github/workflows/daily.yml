name: Daily data collection

# Runs every day and also on demand from the Actions tab (Run workflow).
on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC ~ 07:00 Cairo
  workflow_dispatch: {}

# Allow the action to commit the refreshed JSON back to the repo.
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run collector
        run: python scripts/collect.py

      - name: Commit refreshed data (only if changed)
        run: |
          git config user.name "ecolab-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json data/history.json
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "data: daily refresh $(date -u +%Y-%m-%d)"
            git push
          fi
